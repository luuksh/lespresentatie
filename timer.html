<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Klas Timer</title>
  <style>
    :root {
      --bg-1: #0f1d35;
      --bg-2: #172b49;
      --card: #1f365a;
      --line: rgba(190, 212, 245, 0.28);
      --text: #edf4ff;
      --muted: #bdd0ee;
      --accent: #64c5ff;
      --accent-deep: #2b95f5;
      --good: #39d78b;
      --warn: #f5c15b;
      --danger: #ff7171;
      --font-ui: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      padding: 10px;
      font-family: var(--font-ui);
      color: var(--text);
      background:
        radial-gradient(380px 220px at 20% 8%, rgba(71, 132, 218, 0.26), transparent 64%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .timer {
      width: min(360px, 100%);
      border-radius: 20px;
      border: none;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .title {
      margin: 0;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .kbd {
      border: 1px solid rgba(188, 215, 247, 0.34);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 10px;
      color: #d2e5ff;
      background: rgba(9, 19, 35, 0.36);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      white-space: nowrap;
    }

    .clock-wrap {
      display: grid;
      place-items: center;
      padding: 1px 0;
      gap: 7px;
    }

    .clock {
      position: relative;
      width: 228px;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      border: 10px solid rgba(176, 208, 248, 0.28);
      background:
        radial-gradient(circle at 30% 18%, rgba(172, 209, 255, 0.35) 0%, rgba(172, 209, 255, 0) 42%),
        radial-gradient(circle at 50% 34%, #2e5788 0%, #17375e 57%, #102541 100%);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.14),
        inset 0 -16px 28px rgba(5, 12, 22, 0.48),
        0 18px 30px rgba(7, 16, 31, 0.42);
      overflow: hidden;
      touch-action: none;
      cursor: crosshair;
    }

    .clock::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      border: 1px solid rgba(208, 230, 255, 0.18);
      box-shadow:
        inset 0 0 0 5px rgba(8, 23, 42, 0.22),
        inset 0 12px 26px rgba(239, 248, 255, 0.06);
    }

    .clock::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 3;
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.14) 0%, rgba(255, 255, 255, 0.02) 40%, rgba(255, 255, 255, 0) 65%);
      mix-blend-mode: screen;
    }

    .bezel {
      position: absolute;
      inset: 6px;
      z-index: 0;
      border-radius: 50%;
      border: 1px solid rgba(203, 228, 255, 0.26);
      box-shadow:
        inset 0 0 0 8px rgba(6, 16, 30, 0.2),
        inset 0 8px 14px rgba(229, 242, 255, 0.08);
    }

    .dial {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .tick {
      position: absolute;
      z-index: 2;
      left: 50%;
      top: 10px;
      width: 2px;
      height: 10px;
      border-radius: 2px;
      background: rgba(218, 232, 249, 0.6);
      transform-origin: 50% calc(114px - 10px);
    }

    .tick.big {
      width: 3px;
      height: 18px;
      background: rgba(244, 250, 255, 0.94);
      box-shadow: 0 0 6px rgba(204, 232, 255, 0.44);
    }

    .progress {
      position: absolute;
      z-index: 2;
      inset: 10px;
      border-radius: 50%;
      background: conic-gradient(from var(--start-angle, 0deg), rgba(108, 204, 255, 0.97) calc(var(--pct, 0) * 1%), rgba(164, 198, 245, 0.04) 0);
      opacity: 0.95;
      box-shadow:
        inset 0 0 0 1px rgba(160, 219, 255, 0.24),
        0 0 12px rgba(93, 190, 255, 0.32);
      pointer-events: none;
    }

    .live-progress {
      position: absolute;
      z-index: 1;
      inset: 10px;
      border-radius: 50%;
      background: conic-gradient(rgba(227, 241, 255, 0.52) calc(var(--live-pct, 0) * 1%), rgba(164, 198, 245, 0.03) 0);
      opacity: 0.52;
      box-shadow: inset 0 0 0 1px rgba(208, 230, 255, 0.14);
      pointer-events: none;
    }

    .hand {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 5px;
      height: 82px;
      border-radius: 6px;
      background: linear-gradient(180deg, #fefefe 0%, #dbf0ff 35%, #53bdff 100%);
      transform-origin: 50% 88%;
      transform: translate(-50%, -88%) rotate(var(--angle, 0deg));
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.66),
        0 0 14px rgba(118, 210, 255, 0.72);
      z-index: 4;
      pointer-events: none;
    }

    .hand::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -10px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f8fcff;
      transform: translateX(-50%);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.78),
        0 0 12px rgba(127, 212, 255, 0.72);
    }

    .live-hand {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 3px;
      height: 84px;
      border-radius: 4px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(232, 246, 255, 0.95) 40%, rgba(157, 217, 255, 0.84) 100%);
      transform-origin: 50% 88%;
      transform: translate(-50%, -88%) rotate(var(--live-angle, 0deg));
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.55),
        0 0 12px rgba(186, 228, 255, 0.62);
      z-index: 4;
      pointer-events: none;
    }

    .hub {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 17px;
      height: 17px;
      border-radius: 50%;
      z-index: 7;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at 35% 35%, #ffffff, #a4dbff 62%, #4d9fd7 100%);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 0 12px rgba(129, 205, 255, 0.52);
    }

    .numeral {
      position: absolute;
      z-index: 5;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.03em;
      color: rgba(236, 246, 255, 0.96);
      text-shadow:
        0 1px 1px rgba(4, 12, 23, 0.5),
        0 0 10px rgba(184, 226, 255, 0.3);
    }

    .numeral.n12 { left: 50%; top: 16px; transform: translateX(-50%); }
    .numeral.n3 { right: 16px; top: 50%; transform: translateY(-50%); }
    .numeral.n6 { left: 50%; bottom: 44px; transform: translateX(-50%); }
    .numeral.n9 { left: 16px; top: 50%; transform: translateY(-50%); }

    .digital {
      position: absolute;
      left: 50%;
      bottom: 23px;
      transform: translateX(-50%);
      width: 104px;
      border-radius: 10px;
      border: 1px solid rgba(197, 218, 246, 0.24);
      background: linear-gradient(180deg, rgba(7, 19, 35, 0.58), rgba(5, 14, 27, 0.42));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 6px 12px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(1px);
      text-align: center;
      padding: 4px 6px;
      z-index: 6;
    }

    .time {
      font-size: 25px;
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
      text-shadow: 0 0 10px rgba(126, 214, 255, 0.36);
    }

    .state {
      margin-top: 2px;
      font-size: 9px;
      color: #cde1fb;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .state:empty {
      display: none;
    }

    .scrub-hint {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-align: center;
    }

    .panel {
      border: 1px solid rgba(186, 210, 246, 0.16);
      border-radius: 14px;
      background: rgba(11, 25, 43, 0.22);
      padding: 8px;
      display: grid;
      gap: 7px;
    }

    .nudge {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .chip {
      height: 30px;
      border: 1px solid rgba(186, 210, 246, 0.26);
      border-radius: 999px;
      color: #dcecff;
      background: rgba(204, 223, 246, 0.12);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .edit {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto;
      gap: 6px;
      align-items: center;
    }

    .edit span {
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }

    input[type="number"] {
      height: 36px;
      border-radius: 10px;
      border: 1px solid rgba(186, 210, 246, 0.3);
      background: rgba(8, 18, 33, 0.48);
      color: var(--text);
      text-align: center;
      font-size: 15px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      padding: 0 6px;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: rgba(100, 197, 255, 0.8);
      box-shadow: 0 0 0 2px rgba(100, 197, 255, 0.22);
    }

    .btn.compact {
      height: 32px;
      min-width: 48px;
      padding: 0 10px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .row > * { flex: 1; }

    .btn {
      height: 36px;
      border: 1px solid rgba(186, 210, 246, 0.26);
      border-radius: 10px;
      color: var(--text);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.04));
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform 0.08s ease, border-color 0.14s ease, filter 0.15s ease;
    }

    .btn:hover { border-color: rgba(201, 224, 255, 0.52); }
    .btn:active { transform: translateY(1px); }

    .btn.primary {
      color: #06223f;
      border-color: transparent;
      background: linear-gradient(180deg, var(--accent), var(--accent-deep));
      box-shadow: 0 8px 18px rgba(43, 149, 245, 0.28);
    }

    .btn.warn {
      color: #3d2a00;
      border-color: transparent;
      background: linear-gradient(180deg, #ffd9a0, var(--warn));
    }

    .btn.ghost {
      background: linear-gradient(180deg, rgba(196, 216, 247, 0.16), rgba(196, 216, 247, 0.08));
    }

    .compact-actions .btn {
      height: 34px;
    }

    .clock.done {
      animation: glow 0.9s ease-in-out infinite;
      border-color: rgba(255, 154, 154, 0.56);
      box-shadow:
        0 0 0 5px rgba(255, 113, 113, 0.2),
        inset 0 2px 0 rgba(255, 255, 255, 0.08),
        inset 0 -14px 24px rgba(5, 12, 22, 0.45),
        0 14px 24px rgba(7, 16, 31, 0.4);
    }

    @keyframes glow {
      0% { transform: scale(1); }
      50% { transform: scale(1.015); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="timer" role="timer" aria-live="polite">
    <div class="clock-wrap">
      <div class="clock" id="clock" aria-label="Live klok met timerlaag">
        <div class="bezel"></div>
        <div class="live-progress" id="liveRing"></div>
        <div class="progress" id="ring"></div>
        <div class="dial" id="dial"></div>
        <div class="live-hand" id="liveHand"></div>
        <div class="hand" id="hand"></div>
        <div class="hub"></div>
        <div class="numeral n12">12</div>
        <div class="numeral n3">3</div>
        <div class="numeral n6">6</div>
        <div class="numeral n9">9</div>
        <div class="digital">
          <div class="time" id="time">00:00</div>
          <div class="state" id="state"></div>
        </div>
      </div>
      <div class="kbd">selecteer op de rand · spatie start/pauze · R/Esc reset</div>
    </div>

  </div>

  <script>
    const FULL_CIRCLE_SECONDS = 60 * 60;

    let total = 0;
    let remaining = 0;
    let running = false;
    let intervalId = null;
    let endAtMs = 0;
    let latestLiveAngleDeg = 0;
    let selectionStartDeg = 0;
    let bellAudioCtx = null;

    const timeEl = document.getElementById('time');
    const stateEl = document.getElementById('state');
    const liveRingEl = document.getElementById('liveRing');
    const ringEl = document.getElementById('ring');
    const liveHandEl = document.getElementById('liveHand');
    const handEl = document.getElementById('hand');
    const clockEl = document.getElementById('clock');
    const dialEl = document.getElementById('dial');
    const startBtn = null;
    const resetBtn = null;
    const applyBtn = null;
    const minIn = null;
    const secIn = null;

    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

    function fmtMMSS(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function getLiveClockAngles(now) {
      const minuteAngle = ((now.getMinutes() + now.getSeconds() / 60 + now.getMilliseconds() / 60000) / 60) * 360;
      const hourAngle = (((now.getHours() % 12) + now.getMinutes() / 60 + now.getSeconds() / 3600) / 12) * 360;
      return { minuteAngle, hourAngle };
    }

    function syncInputsFrom(value) {
      const m = Math.floor(value / 60);
      const s = value % 60;
      if (minIn) minIn.value = String(m);
      if (secIn) secIn.value = String(s);
    }

    function updateDigits() {
      const shownSeconds = total > 0 || running ? remaining : 0;
      timeEl.textContent = fmtMMSS(shownSeconds);
      if (running) {
        stateEl.textContent = 'Timer bezig';
      } else if (total === 0) {
        stateEl.textContent = '';
      } else if (remaining === 0) {
        stateEl.textContent = 'Klaar';
      } else {
        stateEl.textContent = 'Timer gepauzeerd';
      }
    }

    function playBell() {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;
      try {
        bellAudioCtx = bellAudioCtx || new AudioCtx();
        if (bellAudioCtx.state === 'suspended') bellAudioCtx.resume();
        const start = bellAudioCtx.currentTime;
        const end = start + 0.45;
        const gain = bellAudioCtx.createGain();
        const osc = bellAudioCtx.createOscillator();
        const osc2 = bellAudioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1318.5, start);
        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(1760, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(0.14, start + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, end);
        osc.connect(gain);
        osc2.connect(gain);
        gain.connect(bellAudioCtx.destination);
        osc.start(start);
        osc2.start(start);
        osc.stop(end);
        osc2.stop(end);
      } catch (err) {
        // Ignore audio failures (browser policy or unsupported APIs).
      }
    }

    function updateLiveClock() {
      const now = new Date();
      const { minuteAngle, hourAngle } = getLiveClockAngles(now);
      const liveDone = minuteAngle / 360;
      latestLiveAngleDeg = minuteAngle;
      liveRingEl.style.setProperty('--live-pct', (liveDone * 100).toFixed(4));
      liveHandEl.style.setProperty('--live-angle', `${latestLiveAngleDeg.toFixed(4)}deg`);
      handEl.style.setProperty('--angle', `${hourAngle.toFixed(4)}deg`);
      if (!running && total === 0) selectionStartDeg = latestLiveAngleDeg;
    }

    function updateTimerOverlay() {
      const selectionDone = total > 0 ? total / FULL_CIRCLE_SECONDS : 0;
      const runDone = (total - remaining) / FULL_CIRCLE_SECONDS;
      const done = running ? runDone : selectionDone;
      ringEl.style.setProperty('--start-angle', `${selectionStartDeg.toFixed(4)}deg`);
      ringEl.style.setProperty('--pct', (done * 100).toFixed(4));
      clockEl.classList.toggle('done', total > 0 && remaining === 0 && !running);
    }

    function renderTimer() {
      updateDigits();
      updateTimerOverlay();
    }

    function setByAngle(clientX, clientY) {
      const rect = clockEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = clientX - cx;
      const dy = clientY - cy;
      let angle = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
      if (angle < 0) angle += 360;
      const selectedArc = (angle - selectionStartDeg + 360) % 360;
      total = clamp(Math.round((selectedArc / 360) * FULL_CIRCLE_SECONDS), 0, FULL_CIRCLE_SECONDS);
      remaining = total;
      running = false;
      clearInterval(intervalId);
      syncInputsFrom(total);
      renderTimer();
    }

    function isInScrubBand(clientX, clientY) {
      const rect = clockEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = clientX - cx;
      const dy = clientY - cy;
      const dist = Math.hypot(dx, dy);
      const radius = Math.min(rect.width, rect.height) / 2;
      return dist >= radius - 42 && dist <= radius - 8;
    }

    function setFromInputs() {
      const m = clamp(parseInt(minIn?.value, 10) || 0, 0, 60);
      const s = clamp(parseInt(secIn?.value, 10) || 0, 0, 59);
      total = clamp(m * 60 + s, 0, FULL_CIRCLE_SECONDS);
      remaining = total;
      running = false;
      clearInterval(intervalId);
      if (startBtn) startBtn.textContent = 'Start';
      renderTimer();
    }

    function applyPreset(delta) {
      const next = clamp(remaining + delta, 0, FULL_CIRCLE_SECONDS);
      remaining = next;
      total = running ? total : next;
      if (running) endAtMs = Date.now() + remaining * 1000;
      syncInputsFrom(!running ? total : remaining);
      renderTimer();
    }

    function tick() {
      if (!running) return;
      remaining = clamp(Math.ceil((endAtMs - Date.now()) / 1000), 0, total);
      if (remaining === 0) {
        clearInterval(intervalId);
        running = false;
        if (startBtn) startBtn.textContent = 'Start';
        playBell();
        if (navigator.vibrate) navigator.vibrate([180, 90, 180]);
        total = 0;
        remaining = 0;
        selectionStartDeg = latestLiveAngleDeg;
        syncInputsFrom(0);
        renderTimer();
        return;
      }
      renderTimer();
    }

    function start() {
      if (total <= 0) return;
      if (remaining <= 0) remaining = total;
      running = true;
      endAtMs = Date.now() + remaining * 1000;
      if (startBtn) startBtn.textContent = 'Pauze';
      clearInterval(intervalId);
      intervalId = setInterval(tick, 200);
      tick();
    }

    function pause() {
      if (!running) return;
      remaining = clamp(Math.ceil((endAtMs - Date.now()) / 1000), 0, total);
      running = false;
      clearInterval(intervalId);
      if (startBtn) startBtn.textContent = 'Start';
      renderTimer();
    }

    function reset() {
      running = false;
      clearInterval(intervalId);
      total = 0;
      remaining = 0;
      selectionStartDeg = latestLiveAngleDeg;
      if (startBtn) startBtn.textContent = 'Start';
      syncInputsFrom(0);
      renderTimer();
    }

    startBtn?.addEventListener('click', () => (running ? pause() : start()));
    resetBtn?.addEventListener('click', reset);
    applyBtn?.addEventListener('click', setFromInputs);

    window.addEventListener('keydown', (e) => {
      const hardReload = (e.metaKey || e.ctrlKey) && e.shiftKey && e.code === 'KeyR';
      if (hardReload) {
        window.location.reload();
        return;
      }

      if (e.target && (e.target.tagName === 'INPUT' || e.target.isContentEditable)) return;
      if (e.code === 'Space') {
        e.preventDefault();
        running ? pause() : start();
      }
      const plainR = e.code === 'KeyR' && !e.metaKey && !e.ctrlKey && !e.altKey && !e.shiftKey;
      if (plainR || e.code === 'Escape') {
        e.preventDefault();
        reset();
      }
    });

    function drawTicks() {
      for (let i = 0; i < 60; i++) {
        const tick = document.createElement('div');
        tick.className = `tick${i % 5 === 0 ? ' big' : ''}`;
        tick.style.transform = `translateX(-50%) rotate(${i * 6}deg)`;
        dialEl.appendChild(tick);
      }
    }

    let scrubbing = false;
    const stopScrub = () => { scrubbing = false; };
    clockEl.addEventListener('pointerdown', (e) => {
      if (!isInScrubBand(e.clientX, e.clientY)) return;
      pause();
      scrubbing = true;
      clockEl.setPointerCapture(e.pointerId);
      selectionStartDeg = latestLiveAngleDeg;
      setByAngle(e.clientX, e.clientY);
    });
    clockEl.addEventListener('pointermove', (e) => {
      if (!scrubbing) return;
      setByAngle(e.clientX, e.clientY);
    });
    clockEl.addEventListener('pointerup', stopScrub);
    clockEl.addEventListener('pointercancel', stopScrub);

    drawTicks();
    renderTimer();
    updateLiveClock();
    setInterval(updateLiveClock, 250);
  </script>
</body>
</html>
